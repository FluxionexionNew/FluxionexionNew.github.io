<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BedrockTiers — временно закрыт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0c15 0%, #1a1f2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }

        .card {
            max-width: 560px;
            width: 100%;
            background: rgba(18, 22, 30, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 48px 32px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 255, 0.2);
        }

        .icon {
            font-size: 72px;
            line-height: 1;
            margin-bottom: 24px;
            filter: drop-shadow(0 0 15px #00ffff);
        }

        h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #00ffff, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 170, 0, 0.15);
            border: 1px solid #ffaa00;
            color: #ffaa00;
            font-weight: 700;
            font-size: 14px;
            padding: 8px 18px;
            border-radius: 60px;
            margin-bottom: 28px;
            letter-spacing: 0.3px;
            backdrop-filter: blur(5px);
        }

        p {
            color: #b0c0d0;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 36px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .telegram-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(145deg, #2a6d9c, #1f5380);
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 20px;
            padding: 20px 42px;
            border-radius: 80px;
            box-shadow: 0 15px 30px -8px rgba(0, 170, 255, 0.4);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 32px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .telegram-link:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px -8px #00aaff;
            background: linear-gradient(145deg, #2f7bb5, #256396);
        }

        .telegram-link:active {
            transform: scale(0.98);
        }

        .telegram-icon {
            font-size: 28px;
        }

        .note {
            color: #6f7d95;
            font-size: 15px;
            border-top: 1px solid rgba(0, 255, 255, 0.15);
            padding-top: 28px;
            margin-top: 8px;
        }

        .note a {
            color: #00ffff;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dotted #00ffff;
        }

        .note a:hover {
            border-bottom: 1px solid #00ffff;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⛔</div>
        <h1>BEDROCKTIERS</h1>
        <div class="badge">ВРЕМЕННО ЗАКРЫТ</div>
        <p>
            Сайт на реконструкции. Чтобы следить за новостями, обновлениями и программой, подпишитесь на официальный Telegram-канал.
        </p>

        <a href="https://t.me/bedrocktiersbyfluxi" class="telegram-link" target="_blank" rel="noopener noreferrer">
            <span class="telegram-icon">📱</span>
            Перейти в Telegram
        </a>

        <div class="note">
            <span>👉 </span><a href="https://t.me/bedrocktiersbyfluxi" target="_blank" rel="noopener noreferrer">t.me/bedrocktiersbyfluxi</a><span> 👈</span>
            <br><br>
            Подписывайся, чтобы не пропустить запуск!
        </div>
    </div>
</body>
</html>
